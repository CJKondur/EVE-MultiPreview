name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install AutoHotkey v2
        run: |
          Invoke-WebRequest -Uri "https://www.autohotkey.com/download/ahk-v2.exe" -OutFile "ahk-v2-setup.exe"
          Start-Process -FilePath "ahk-v2-setup.exe" -ArgumentList "/S" -Wait
        shell: pwsh

      - name: Compile EXE
        run: |
          & "C:\Program Files\AutoHotkey\Compiler\Ahk2Exe.exe" /in "Main.ahk" /out "EVE MultiPreview.exe" /icon "Icon.ico" /base "C:\Program Files\AutoHotkey\v2\AutoHotkey64.exe"
        shell: pwsh

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: EVE MultiPreview.exe
          generate_release_notes: true
